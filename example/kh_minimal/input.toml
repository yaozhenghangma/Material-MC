# Minimal KH input example.
# This file demonstrates global KH couplings J/K/G/Gp under [Hamiltonian],
# plus required KH bond-type to direction mapping.

[MonteCarlo]
start_temperature = 0.0
end_temperature = 10.0
temperature_points_number = 2
relaxing_steps = 10
counting_steps = 10
flipping_number = 10
method = "classical"
exchange_step = 1

[Lattice]
cell_number = [ 1, 1, 1 ]
tolerance = 0.01

[[Elements]]
name = "Ni"
spin = 1.0
anisotropic_factor = [ 1.0, 1.0, 1.0 ]
[[Elements.Neighbors]]
name = "Ni"
exchange_parameter = 0.0
distance = 1.0

[Hamiltonian]
model = "Kitaev-Heisenberg"
custom = false
magnetic_field = [ 0.0, 0.0, 0.0 ]
anisotropy = [ 0.0, 0.0, 0.0 ]
KitaevEpsilon = 1e-12
KitaevTolerance = 1e-6
J = -1.0
K = 2.0
G = 0.5
Gp = -0.25

[Hamiltonian.BondTypeDirection]
type1 = "x"
type2 = "y"
type3 = "z"

[Initialization]
angleA = [ 0.0, 0.0, 0.0 ]
angleB = [ 0.0, 0.0, 0.0 ]
angleC = [ 0.0, 0.0, 0.0 ]

[Output]
magnifying_factor = 1.0
ground_state = false
